<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title }} | Client Gateway UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('ui-static', path='css/ui.css') }}" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-kicker">LLMAPI CLIENT</span>
      <a href="/ui" class="brand-title">Gateway Console</a>
    </div>
    <nav class="nav">
      <a href="/ui" class="nav-link {% if path == '/ui' or path == '/ui/' %}active{% endif %}">대시보드</a>
      <a href="/ui/test" class="nav-link {% if path.startswith('/ui/test') %}active{% endif %}">분석 테스트</a>
      <a href="/ui/history" class="nav-link {% if path.startswith('/ui/history') %}active{% endif %}">요청 이력</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">Client Gateway UI · no-login internal console</footer>

  <script src="{{ url_for('ui-static', path='js/ui_common.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
