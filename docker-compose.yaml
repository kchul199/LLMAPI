services:
  api:
    build: .
    container_name: llmapi-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  redis:
    image: redis:alpine
    container_name: llmapi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
